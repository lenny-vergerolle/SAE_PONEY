<!DOCTYPE html>
<html lang="fr">
    <head>
        {% block head %}
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>Grand Galop</title>
        <link rel="icon" type="image/png" sizes="16x16" href="../static/img/logo.png" />
        <meta name="msapplication-TileColor" content="#ffffff" />
        <meta name="theme-color" content="#ffffff" />
        <link rel="stylesheet" href="{{ url_for('static',filename='style.css')}}" />
        {% endblock %} {% block styles %}
        <!-- Bootstrap CSS -->
        {{ bootstrap.load_css() }} {% endblock %}
    </head>

    <body>
        <header>
            <nav class="navbar border">
                <div class="mx-5">
                    <a href="{{url_for('home')}}" class="d-flex flex-wrap justify-content-center text-black text-decoration-none">
                        <img src="{{url_for('static', filename='img/logo.png')}}" alt="logo" style="width: 50px; height: auto; margin-right: 15px;">
                        <h2>Grand Galop</h2>
                    </a>
                </div>

                <div class="mx-5 d-flex align-items-center flex-wrap">
                    <a href="" class="mx-4 text-black text-decoration-none" style="font-size: 1.3em;">
                        Inscription
                    </a>
                    <a href="" class="mx-4 btn-vert">
                        Se connecter
                    </a>
                </div>
            </nav>
        </header>

        <main>{% block content %} {% endblock %}</main>
    </body>

</html>
