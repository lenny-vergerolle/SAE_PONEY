<!DOCTYPE html>
<html lang="fr">
    <head>
        {% block head %}
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <title>GranGalop</title>
        <link rel="icon" type="image/png" sizes="16x16"  href="../static/img/logo.svg">
        <meta name="msapplication-TileColor" content="#ffffff">
        <meta name="theme-color" content="#ffffff">
        <link rel="stylesheet" href="{{ url_for('static',filename='style.css')}}">
        {% endblock %}
        {% block styles %}
            <!-- Bootstrap CSS -->
            {{ bootstrap.load_css() }}
        {% endblock %}
    </head> 
    
    <body class="container d-flex flex-column align-items-stretch">
        <header class="d-flex flex-column align-items-center m-5">
            <div class="d-flex justify-content-center m-5">
                <img class = "my-2 img
                -fluid" src=" " alt="logo de GrandGalop">
                <strong class = "plc-dark font-weight-bolder display-3 fw-bolder">GrandGalop</strong>
            </div>
        </header>

        <form method="post" action="{{ url_for('home') }}" enctype="multipart/form-data">
            <h1> Bienvenue </h1>
        </form>

        <button class="mt-3"><a href={{url_for('logout')}}>Se déconnecter<a/></button>

    </body>
</html>
