<!DOCTYPE html>
{%extends 'base.html'%}
{%block content%}

<div class="mx-auto w-75 d-flex flex-column align-items-center div-dark rounded-4 mb-3 p-4">
    <h1 class="mt-3 fw-bolder display-4 m-4 color_white">Créer un cours privée</h1>
    <form action="{{ url_for('creer_cours') }}" method="post">
        {{ form.hidden_tag() }}
        <div class ="mx-auto d-flex flex-column m-4 w-50">
            <label class="my-3 color_white fs-5" for="name">{{ form.nomCo.label }} </label>
            {{ form.nomCo(size=50, class_="form-control rounded-5 ") }}
        </div> 
        <div class="mx-auto d-flex flex-column m-4 w-50">
            <label class="my-3 fs-5" for="adherents">{{ form.adherents.label }}</label>
            {{ form.adherents(class_="form-control, size=1") }}
        </div>
        

        <div class="d-flex justify-content-center mt-3">
            <input class="btn btn-vert fw-bolder" type="submit" name="enregistrer" id="enregister" value="Enregistrer">
        </div>

        
    </form>

</div>
{%endblock%}
