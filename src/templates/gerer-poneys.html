{% extends 'base.html' %}
{% block content %}
<div class="page" style="background-color: #ECF8F6;min-height: 92vh;">
    <div class="d-flex justify-content-center">
        <h1 class="fw-bolder display-4 m-4">Gérer les Poneys </h1>
    </div>
    <h3>Liste des Poneys</h3>
    <table class="table table-striped table-hover">
        <thead>
            <tr>
                <th scope="col">Nom</th>
                <th scope="col">Poids</th>
                <th scope="col">Date de naissance</th>
                <th scope="col">Supprimer</th>
                <th scope="col"><td><a href="{{url_for('ajout_poney')}}" class="btn-vert">Ajouter</a></td></th>
                

            </tr>
        </thead>
        <tbody>
             
            {% for poney in poneys %}
            <tr>
                <td>{{poney.nomPo}}</td>
                <td>{{poney.poidsMax}}</td>
                <td>{{poney.ddnPo}}</td>
                <td><a href="{{url_for('suppression_poney',idPo = poney.idPo)}}" class="btn-vert">Supprimer</a></td>
            </tr>
            {% endfor %}
        </tbody>
        
    </table>


</div>
{% endblock %}
