{%extends 'base.html' %}
{% block content %}
    {% block styles %}
        {{ super() }}
        <link rel="stylesheet" href="{{ url_for('static', filename='accueil_visiteur.css')}}">
    {% endblock %}

    <div class="fleche">
        <a href="">
            <img src="{{ url_for('static', filename='img/fleche_retour.png') }}" alt="Flèche" style="width:25px;height:auto;">
        </a>
    </div>
    <div class="accueil">
        <div class="image">
            <img src="{{ url_for('static', filename='img/inscrire.png') }}" alt="inscrire">
        </div>
        <div class="texte">
            <h1>Inscrivez-vous au club</h1>
            <p>Rejoignez-nous pour des cours adaptés à tous les niveaux, dans un cadre<br>

            <a href="{{ url_for('signin') }}" class="mx-4 btn-vert">
                S'inscrire au club
            </a>
        </div>
    </div>
{% endblock %}
