{% extends 'base.html' %}
{% block content %}
<div class="page" style="background-color: #ECF8F6;min-height: 92vh;">
    <div class="d-flex justify-content-center">
        <h1 class="fw-bolder display-4 m-4">Gérer les moniteurs </h1>
    </div>
    <h3>Liste des moniteurs</h3>
    <table class="table table-striped table-hover">
        <thead>
            <tr>
                <th scope="col">Nom</th>
                <th scope="col">Prénom</th>
                <th scope="col">Date de naissance</th>
                <th scope="col">Supprimer</th>
                <th scope="col"><td><a href="{{url_for('ajout_moniteur')}}" class="btn-vert">Ajouter</a></td></th>
                

            </tr>
        </thead>
        <tbody>
             
            {% for moniteur in moniteurs %}
            <tr>
                <td>{{moniteur.nom_utilisateur}}</td>
                <td>{{moniteur.prenom_utilisateur}}</td>
                <td>{{moniteur.ddn_utilisateur}}</td>
                <td ><a href="{{url_for('suppression_moniteur',id_utilisateur = moniteur.id_utilisateur)}}" class="btn-vert" style="margin:0;display: block; width: 100%; height: 100%;">Supprimer</a></td>
            </tr>
            {% endfor %}
        </tbody>
        
    </table>


</div>
{% endblock %}
